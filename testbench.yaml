# testbench.yaml — generated by filament-plugin-workbench
#
# This file is plugin-specific.
# Copy it as testbench.yaml in the plugin root and adjust:
#   - providers: list your plugin's ServiceProviders
#   - env.APP_KEY: generate a key with `php artisan key:generate --show`
#   - env.DB_*: configure SQLite (default) or another database driver

providers:
  - 'CoringaWc\FilamentActionApprovals\FilamentActionApprovalsServiceProvider'

workbench:
  install: true
  discovers:
    config: true

env:
  APP_KEY: "base64:Xk9d6lV1RUWJXz7HP2oZPelGkgcXBB1k9QxFegMkNO8="
  APP_ENV: testing
  APP_DEBUG: true

  DB_CONNECTION: sqlite
  # For unit tests (default — no persistence between requests):
  DB_DATABASE: ":memory:"
  # For workbench serve (persistence across HTTP requests):
  # DB_DATABASE: "/var/www/html/workbench/database/database.sqlite"

  CACHE_STORE: array
  SESSION_DRIVER: array
  QUEUE_CONNECTION: sync

  LOG_CHANNEL: stderr
  LOG_LEVEL: debug
